# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: tick-sync

before:
  hooks:
    - go mod tidy

builds:
  - id: tick-sync
    main: ./cmd/app
    binary: tick-sync
    ldflags:
      - -s -w -X github.com/prepin/tick-sync/internal/version.Version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz

dockers_v2:
  - id: tick-sync
    dockerfile: Dockerfile.goreleaser
    ids:
      - tick-sync
    images:
      - ghcr.io/prepin/tick-sync
    tags:
      - '{{ .Tag }}'
      - latest
    labels:
      org.opencontainers.image.title: tick-sync
      org.opencontainers.image.description: Sync Google Tasks to TickTick
      org.opencontainers.image.url: https://github.com/prepin/tick-sync
      org.opencontainers.image.source: https://github.com/prepin/tick-sync
      org.opencontainers.image.version: '{{ .Version }}'
      org.opencontainers.image.revision: '{{ .Commit }}'
      org.opencontainers.image.created: '{{ .Date }}'
      org.opencontainers.image.licenses: MIT
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: false
    flags:
      - --provenance=false

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
